name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Verify committed tailwind.css is up to date
        run: |
          npm run build:css
          if ! git diff --quiet -- static/css/tailwind.css; then
            echo "::error::static/css/tailwind.css is out of date. Run 'npm run build:css' and commit the result."
            git diff --stat -- static/css/tailwind.css
            exit 1
          fi

      - name: Run payroll_calc unit tests (no external dependencies)
        run: pytest tests/test_payroll_calc.py -v

      - name: Run app integration tests (requires DATABASE_URL/JWT_SECRET secrets)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::warning::DATABASE_URL secret is not set on this repo — skipping DB-backed tests (these import main.py, which connects to the DB at startup). Add it under Settings > Secrets and variables > Actions to enable them."
            exit 0
          fi
          pytest tests/test_auth.py tests/test_frontend.py tests/test_currency.py -v
