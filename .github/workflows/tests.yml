name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Scan Python dependencies for known vulnerabilities
        # Warn-only for now: pip-audit already finds 21 known vulnerabilities
        # in current pinned deps (pyjwt, python-dotenv, starlette) that
        # predate this scanning step — fixing those is a separate dependency-
        # upgrade effort, not something this step should block merges on.
        # Findings are printed to the CI log either way so they stay visible.
        run: pip-audit -r requirements.txt || echo "::warning::pip-audit found known vulnerabilities — see log above. Non-blocking for now; see tech-debt notes."

      - name: Scan Node dependencies for known vulnerabilities
        run: npm audit || echo "::warning::npm audit found known vulnerabilities — see log above. Non-blocking for now."

      - name: Verify the Tailwind build pipeline still runs
        run: |
          # Not a diff-against-committed-output *failure* check: two
          # different comparison strategies (byte-exact, then a semantic
          # utility-class set comparison) were both tried here and both
          # produced false-positive CI *failures* — the build is not fully
          # deterministic across separate `npm ci` installs (observed
          # cosmetic reordering, and even a spurious core utility class like
          # `.static{position:static}` appearing in one build but not another
          # with zero source changes). Chasing full automation of "is the
          # committed CSS exactly right" as a blocking check cost two failed
          # CI iterations for something inherently unstable in this
          # environment.
          #
          # This step still confirms the build command itself runs to
          # completion (catches a broken tailwind.config.js, a missing
          # content glob, etc.), and now additionally emits a non-blocking
          # ::warning:: if the freshly-built output differs from the
          # committed file — a *warning* has no false-positive-failure cost
          # (an occasional spurious nudge is cheap), so it's safe to leave on
          # even though the diff isn't 100% reliable. Keeping the committed
          # file in sync with source remains a manual step per the README.
          npm run build:css
          if ! git diff --quiet -- static/css/tailwind.css; then
            echo "::warning::static/css/tailwind.css differs from a fresh 'npm run build:css' output. This can be a false positive (the build isn't fully deterministic across installs — see comment above), but if you added/changed Tailwind classes and forgot to rebuild before committing, this is your signal. Run 'npm run build:css' locally and compare before assuming it's spurious."
          fi

      - name: Validate Alembic migrations are up-to-date
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ADMIN_DATABASE_URL: ${{ secrets.ADMIN_DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "Skipping migration check (no DATABASE_URL secret)"
            exit 0
          fi
          # Check if any pending migrations exist (returns non-zero if there are)
          alembic current > /tmp/alembic_current.txt 2>&1 || true
          alembic upgrade --sql head > /tmp/alembic_pending.sql 2>&1 || true
          if grep -q "INSERT INTO alembic_version" /tmp/alembic_pending.sql; then
            echo "::error::Pending Alembic migrations detected. Run 'alembic upgrade head' locally and commit the updates."
            cat /tmp/alembic_pending.sql
            exit 1
          fi
          echo "✓ All Alembic migrations applied"

      - name: Run payroll_calc unit tests (no external dependencies)
        run: pytest tests/test_payroll_calc.py -v

      - name: Run app integration tests (requires DATABASE_URL/ADMIN_DATABASE_URL/JWT_SECRET secrets)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ADMIN_DATABASE_URL: ${{ secrets.ADMIN_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::warning::DATABASE_URL secret is not set on this repo — skipping DB-backed tests (these import main.py, which connects to the DB at startup). Add it under Settings > Secrets and variables > Actions to enable them."
            exit 0
          fi
          # -n 2 --dist loadscope: run test FILES in parallel (2 workers),
          # keeping each file's own tests together in one worker so
          # within-file ordering assumptions still hold. Kept conservative
          # (2, not 4+) because every worker opens its own DB connection
          # pool against the same small shared Supabase instance — this
          # exact setup produced real deadlocks/connection exhaustion when
          # pushed further while building out this test suite.
          #
          # test_performance.py is run separately, sequentially, and NOT
          # parallelized with the rest: its cycle-activation tests snapshot
          # every Active employee institution-wide (see
          # activate_performance_cycle in routers/performance.py), and its
          # cleanup fixture deactivates all of them before each of its own
          # tests. Running that concurrently with any other file that has an
          # employee mid-test would yank that employee out from under it.
          pytest tests/ --ignore=tests/test_payroll_calc.py --ignore=tests/test_performance.py -n 2 --dist loadscope -v
          pytest tests/test_performance.py -v
