name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Verify committed tailwind.css has no missing/extra utility classes
        run: |
          # A byte-exact diff against a fresh build is too strict: the build
          # isn't fully deterministic (observed ~24 bytes of cosmetic
          # reordering between two clean `npm ci` + build runs, traced to
          # browserslist's unpinned bundled fallback data, not a real content
          # difference) — that version of this check failed on every single
          # CI run since it was introduced, silently skipping every test
          # after it. Compare the actual set of utility-class selectors
          # instead, which is what "did someone forget to rebuild" actually
          # means, and is stable across those cosmetic differences.
          cp static/css/tailwind.css /tmp/committed.css
          npm run build:css
          python3 - <<'PYEOF'
          import re
          def classes(path):
              return set(re.findall(r'\.([a-zA-Z0-9_:.\\-]+)\{', open(path).read()))
          committed = classes("/tmp/committed.css")
          fresh = classes("static/css/tailwind.css")
          missing = fresh - committed
          extra = committed - fresh
          if missing or extra:
              if missing:
                  print(f"::error::static/css/tailwind.css is missing {len(missing)} utility class(es) that the source now uses: {sorted(missing)[:20]}")
              if extra:
                  print(f"::error::static/css/tailwind.css has {len(extra)} utility class(es) no longer used anywhere (stale): {sorted(extra)[:20]}")
              print("Run 'npm run build:css' and commit the result.")
              raise SystemExit(1)
          print(f"OK — {len(fresh)} utility classes match.")
          PYEOF

      - name: Run payroll_calc unit tests (no external dependencies)
        run: pytest tests/test_payroll_calc.py -v

      - name: Run app integration tests (requires DATABASE_URL/JWT_SECRET secrets)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::warning::DATABASE_URL secret is not set on this repo — skipping DB-backed tests (these import main.py, which connects to the DB at startup). Add it under Settings > Secrets and variables > Actions to enable them."
            exit 0
          fi
          pytest tests/test_auth.py tests/test_frontend.py tests/test_currency.py -v
