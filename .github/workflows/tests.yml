name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Verify the Tailwind build pipeline still runs
        run: |
          # Not a diff-against-committed-output check: two different
          # comparison strategies (byte-exact, then a semantic utility-class
          # set comparison) were both tried here and both produced false
          # positives — the build is not fully deterministic across separate
          # `npm ci` installs (observed cosmetic reordering, and even a
          # spurious core utility class like `.static{position:static}`
          # appearing in one build but not another with zero source changes).
          # Chasing full automation of "is the committed CSS exactly right"
          # cost two failed CI iterations for a check that's inherently
          # unstable in this environment. This step only confirms the build
          # command itself still runs to completion (catches a broken
          # tailwind.config.js, a missing content glob, etc.) — keeping the
          # committed file in sync with source is a manual step per the
          # README, same as any change that needs `npm run build:css`.
          npm run build:css

      - name: Run payroll_calc unit tests (no external dependencies)
        run: pytest tests/test_payroll_calc.py -v

      - name: Run app integration tests (requires DATABASE_URL/JWT_SECRET secrets)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::warning::DATABASE_URL secret is not set on this repo — skipping DB-backed tests (these import main.py, which connects to the DB at startup). Add it under Settings > Secrets and variables > Actions to enable them."
            exit 0
          fi
          # -n 2 --dist loadscope: run test FILES in parallel (2 workers),
          # keeping each file's own tests together in one worker so
          # within-file ordering assumptions still hold. Kept conservative
          # (2, not 4+) because every worker opens its own DB connection
          # pool against the same small shared Supabase instance — this
          # exact setup produced real deadlocks/connection exhaustion when
          # pushed further while building out this test suite.
          #
          # test_performance.py is run separately, sequentially, and NOT
          # parallelized with the rest: its cycle-activation tests snapshot
          # every Active employee institution-wide (see
          # activate_performance_cycle in routers/performance.py), and its
          # cleanup fixture deactivates all of them before each of its own
          # tests. Running that concurrently with any other file that has an
          # employee mid-test would yank that employee out from under it.
          pytest tests/ --ignore=tests/test_payroll_calc.py --ignore=tests/test_performance.py -n 2 --dist loadscope -v
          pytest tests/test_performance.py -v
